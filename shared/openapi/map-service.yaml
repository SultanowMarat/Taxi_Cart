openapi: 3.0.3
info:
  title: API микросервиса карт Taxi MVP
  version: 1.0.0
  description: "Микросервис карт для выдачи тайлов, локального кеширования PNG-тайлов, startup-загрузки OSM PBF Туркменистана, ночной синхронизации карты, manifest и delta-обновлений."
servers:
  - url: http://localhost:8090
paths:
  /:
    get:
      summary: Корень сервиса
      operationId: redirectToSwagger
      description: "Служебный endpoint. Делает redirect на /swagger, чтобы при открытии базового URL сразу попасть в документацию сервиса."
      responses:
        "302":
          description: Redirect на Swagger UI.
  /swagger:
    get:
      summary: Swagger UI
      operationId: getSwaggerUI
      description: "Возвращает HTML-страницу Swagger UI для ручного тестирования API."
      responses:
        "200":
          description: HTML-страница Swagger UI.
          content:
            text/html:
              schema:
                type: string
  /docs:
    get:
      summary: Документация API
      operationId: getDocsUI
      description: "Алиас для /swagger. Возвращает ту же HTML-страницу документации API."
      responses:
        "200":
          description: HTML-страница Swagger UI.
          content:
            text/html:
              schema:
                type: string
  /openapi.yaml:
    get:
      summary: OpenAPI спецификация
      operationId: getOpenAPISpec
      description: "Возвращает OpenAPI 3.0 YAML контракт микросервиса. Используется Swagger UI, Postman/Insomnia и генераторами API-клиентов."
      responses:
        "200":
          description: OpenAPI YAML документ.
          content:
            application/yaml:
              schema:
                type: string
  /health:
    get:
      summary: Проверка состояния сервиса
      operationId: getHealth
      description: "Проверяет, что map-service запущен и отвечает на HTTP-запросы. Используется для Docker/Kubernetes healthcheck, мониторинга и быстрой диагностики после запуска."
      responses:
        "200":
          description: Текущее состояние сервиса.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/map/version:
    get:
      summary: Текущая версия карты
      operationId: getMapVersion
      description: "Возвращает текущую версию карты. Версия рассчитывается из metadata локального OSM PBF-файла и меняется после успешного скачивания новой карты."
      responses:
        "200":
          description: Метаданные текущей версии карты.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapVersionResponse"
  /api/map/manifest:
    get:
      summary: Manifest тайлов
      operationId: getMapManifest
      description: "Возвращает manifest тайлов для региона: поддерживаемые zoom levels, checksum значения, URL template и час ночной синхронизации карты."
      parameters:
        - name: region
          in: query
          description: "Регион карты. Если параметр не передан, используется turkmenistan."
          required: false
          schema:
            type: string
            default: turkmenistan
      responses:
        "200":
          description: Группы тайлов и checksum для синхронизации кеша клиента.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapManifestResponse"
  /api/map/delta:
    get:
      summary: Delta-обновление карты
      operationId: getMapDelta
      description: "Возвращает список измененных и удаленных тайлов между двумя версиями карты. Нужен, чтобы мобильное приложение скачивало только изменения, а не всю карту заново."
      parameters:
        - name: from
          in: query
          description: Версия карты, которая уже сохранена на устройстве.
          required: false
          schema:
            type: string
          example: tm-2026.05-demo
        - name: to
          in: query
          description: Целевая версия карты. Если не передана, используется текущая версия сервиса.
          required: false
          schema:
            type: string
          example: tm-2026.06-demo
      responses:
        "200":
          description: Измененные и удаленные тайлы между версиями.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapDeltaResponse"
  /api/map/download-info:
    get:
      summary: Информация об OSM PBF-файле
      operationId: getMapDownloadInfo
      description: "Возвращает диагностическую информацию об OSM PBF-файле и metadata последней синхронизации: источник, путь внутри контейнера, наличие файла, размер, ETag, Last-Modified, версию карты и час ночной проверки."
      responses:
        "200":
          description: Статус локального OSM PBF-файла.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadInfoResponse"
  /tiles/{z}/{x}/{y}.png:
    get:
      summary: PNG-тайл карты
      operationId: getRasterTile
      description: "Возвращает PNG raster tile по координатам web map tile scheme. Сервис сначала ищет тайл в локальном `/data/tiles`; если тайла нет, скачивает его из OpenStreetMap, сохраняет локально и отдает клиенту."
      parameters:
        - name: z
          in: path
          description: Zoom level карты.
          required: true
          schema:
            type: integer
          example: 10
        - name: x
          in: path
          description: Номер колонки tile.
          required: true
          schema:
            type: integer
          example: 637
        - name: y
          in: path
          description: Номер строки tile.
          required: true
          schema:
            type: integer
          example: 412
      responses:
        "200":
          description: PNG-тайл карты.
          content:
            image/png:
              schema:
                type: string
                format: binary
        "502":
          description: Внешний tile provider недоступен.
components:
  schemas:
    HealthResponse:
      type: object
      description: Ответ healthcheck endpoint.
      properties:
        ok:
          type: boolean
          description: Признак, что сервис работает.
          example: true
        service:
          type: string
          description: Имя сервиса.
          example: map-service
        time:
          type: string
          format: date-time
          description: Текущее серверное время.
    MapVersionResponse:
      type: object
      description: Текущая версия карты, рассчитанная из metadata локального OSM PBF-файла.
      properties:
        region:
          type: string
          description: Регион карты.
          example: turkmenistan
        version:
          type: string
          description: Версия набора тайлов и картографических данных.
          example: tm-2026.06-demo
        updatedAt:
          type: string
          format: date-time
          description: Время формирования ответа.
    MapManifestResponse:
      type: object
      description: Manifest для кеширования карты на клиенте.
      properties:
        region:
          type: string
          description: Регион карты.
          example: turkmenistan
        version:
          type: string
          description: Версия карты.
          example: tm-2026.06-demo
        strategy:
          type: string
          description: Стратегия обновления карты.
          example: delta
        nightlySyncHour:
          type: integer
          description: Рекомендуемый час фоновой синхронизации.
          example: 3
        tiles:
          type: array
          description: Группы тайлов для загрузки и проверки кеша.
          items:
            $ref: "#/components/schemas/TileGroup"
    TileGroup:
      type: object
      description: Группа тайлов одного zoom level.
      properties:
        z:
          type: integer
          description: Zoom level.
          example: 10
        checksum:
          type: string
          description: Контрольная сумма группы тайлов.
        urlTemplate:
          type: string
          description: URL-шаблон для загрузки PNG-тайлов.
          example: /tiles/{z}/{x}/{y}.png
    MapDeltaResponse:
      type: object
      description: Delta-обновление между версиями карты.
      properties:
        from:
          type: string
          description: Старая версия карты.
        to:
          type: string
          description: Новая версия карты.
        changed:
          type: array
          description: Тайлы, которые нужно скачать заново.
          items:
            $ref: "#/components/schemas/ChangedTile"
        deleted:
          type: array
          description: Тайлы, которые нужно удалить из локального кеша.
          items:
            type: string
    ChangedTile:
      type: object
      description: Измененный tile.
      properties:
        z:
          type: integer
          description: Zoom level.
        x:
          type: integer
          description: Колонка tile.
        y:
          type: integer
          description: Строка tile.
        checksum:
          type: string
          description: Новый checksum tile.
    DownloadInfoResponse:
      type: object
      description: Информация об OSM PBF-файле и последней синхронизации.
      properties:
        source:
          type: string
          format: uri
          description: URL источника OSM данных.
        path:
          type: string
          description: Путь к файлу внутри контейнера.
        metadataPath:
          type: string
          description: Путь к metadata-файлу внутри контейнера.
        exists:
          type: boolean
          description: Найден ли файл.
        version:
          type: string
          description: Текущая версия карты.
          example: tm-a1b2c3d4e5f6a7b8
        sizeBytes:
          type: integer
          format: int64
          description: Размер файла в байтах.
        modifiedAt:
          type: string
          format: date-time
          description: Время последнего изменения файла.
        etag:
          type: string
          description: Remote ETag, сохраненный после последней синхронизации.
        lastModified:
          type: string
          description: Remote Last-Modified, сохраненный после последней синхронизации.
        contentLength:
          type: integer
          format: int64
          description: Remote Content-Length, сохраненный после последней синхронизации.
        downloadedAt:
          type: string
          format: date-time
          description: Время последнего успешного скачивания PBF.
        syncHourUTC:
          type: integer
          description: Час ночной синхронизации в UTC.
          example: 3
        tileStoragePath:
          type: string
          description: Путь локального хранилища PNG-тайлов.
          example: /data/tiles
